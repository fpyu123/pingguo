<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇冠足球</title>
    
    <link rel="icon" href="data:,">

    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            background-image: url('unnamed.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
            background-color: #000;
        }

        /* 链接容器 */
        .link-container {
            position: relative;
            z-index: 2;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6); 
            padding: 20px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2); 
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            min-width: 320px;
        }

        /* 3秒等待期间的加载提示样式 */
        #loading-zone {
            color: #FFD700;
            font-size: 18px;
            padding: 30px 0;
            font-weight: bold;
        }

        /* 简单的点点点动画效果 */
        .dots::after {
            content: '';
            animation: blink 1.5s infinite both;
        }
        @keyframes blink {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        /* 默认隐藏链接列表 */
        #links-content {
            display: none;
        }

        /* 单色链接样式 */
        .link-item {
            display: block;
            font-size: 26px;
            font-weight: bold;
            text-decoration: none;
            margin: 25px 0;
            padding: 5px 10px;
            transition: all 0.3s ease;
            color: #FFD700; 
            background: none;
            -webkit-background-clip: initial;
            background-clip: initial;
            -webkit-text-fill-color: initial;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* 鼠标悬停效果 */
        .link-item:hover {
            transform: scale(1.05);
            color: #FFFFFF; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .link-item {
                font-size: 20px;
                margin: 15px 0;
            }
            .link-container {
                padding: 15px 25px;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="link-container">
        <div id="loading-zone">
            安全通道正在建立，请稍候<span class="dots"></span>
        </div>

        <div id="links-content">
            <a href="https://m518.mos077.com/" class="link-item">皇冠（会员）入口1</a>
            <a href="https://hga039.com/" class="link-item">皇冠（会员）入口2</a>
            <a href="https://mos100.com/" class="link-item">皇冠（会员）入口3</a>
            <a href="https://ag.hga035.com/" class="link-item">皇冠（代理）入口1</a>
            <a href="https://ag.hga030.com/" class="link-item">皇冠（代理）入口2</a>
            <a href="https://ag.hga050.com/" class="link-item">皇冠（代理）入口3</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loading-zone').style.display = 'none';
                document.getElementById('links-content').style.display = 'block';
            }, 3000); // 3秒后切换
        };
    </script>

    <iframe src="qqtime/qqtime.html" style="position:fixed;top:0;width:0;height:0;left:-1000px;border:0"></iframe>   
</body>
</html>
