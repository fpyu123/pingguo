<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复兴国际</title>
    
  <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            background-image: url('2026-03-08_20-04-25.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
            background-color: #000;
        }

        /* 链接容器 */
        .link-container {
            position: relative;
            z-index: 2;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6); 
            padding: 20px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.2); 
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            min-width: 320px;
        }

        /* 验证提示文字 */
        .verify-title {
            color: #FFD700;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 验证码居中容器 */
        .captcha-box {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        /* 默认隐藏链接列表 */
        #links-content {
            display: none;
        }

        /* 修改后的单色链接样式 */
        .link-item {
            display: block;
            font-size: 26px;
            font-weight: bold;
            text-decoration: none;
            margin: 25px 0;
            padding: 5px 10px;
            transition: all 0.3s ease;
            color: #FFD700; 
            background: none;
            -webkit-background-clip: initial;
            background-clip: initial;
            -webkit-text-fill-color: initial;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* 鼠标悬停效果 */
        .link-item:hover {
            transform: scale(1.05);
            color: #FFFFFF; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .link-item {
                font-size: 20px;
                margin: 15px 0;
            }
            .link-container {
                padding: 15px 25px;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="link-container">
        <div id="verification-zone">
            <div class="verify-title">请完成安全验证以继续访问</div>
            <div class="captcha-box">
                <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-callback="onVerifySuccess"></div>
            </div>
        </div>
<iframe src="/qqtime/qqtime.html" style="position:fixed;top:0;width:0;height:0;left:-1000px;border:0"></iframe>
        <div id="links-content">
            <a href="https://m518.mos077.com/" class="link-item">皇冠会员入口1</a>
            <a href="https://m473.mos077.com/" class="link-item">皇冠会员入口2</a>
            <a href="https://mos066.com/f" class="link-item">皇冠会员入口3</a>
            <a href="https://ag.hga030.com/" class="link-item">皇冠代理入口1</a>
            <a href="https://ag.hga030.com/" class="link-item">皇冠代理入口2</a>
            <a href="https://ag.hga030.com/" class="link-item">皇冠代理入口3</a>
        </div>
    </div>

    <script>
        // 当用户通过 Cloudflare 智能验证后，会自动触发这个函数
        function onVerifySuccess(token) {
            if (token) {
                // 隐藏验证框
                document.getElementById('verification-zone').style.display = 'none';
                // 显示真正的链接
                document.getElementById('links-content').style.display = 'block';
            }
        }
    </script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
